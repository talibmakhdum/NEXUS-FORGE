name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Type Check ───
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  # ─── Lint ───
  lint:
    name: ESLint Strict Mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (strict)
        run: npm run lint -- --max-warnings=0

  # ─── Unit Tests (Vitest) ───
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─── E2E Tests (Playwright) ───
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # ─── Build Verification ───
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify bundle size (< 500KB gzipped)
        run: |
          echo "Analyzing bundle size..."
          # Check the .next build output for chunk sizes
          if [ -d ".next/static/chunks" ]; then
            echo "Main chunks:"
            ls -lhS .next/static/chunks/*.js | head -10
            # Calculate total JS size
            total_size=$(find .next/static -name "*.js" -exec cat {} + | wc -c)
            echo "Total JS bundle size: ${total_size} bytes"
            # Rough gzipped estimate (typically ~30% of original)
            gzipped_estimate=$((total_size / 3))
            echo "Estimated gzipped: ~${gzipped_estimate} bytes (~$((gzipped_estimate / 1024)) KB)"
            if [ "$gzipped_estimate" -gt 512000 ]; then
              echo "::warning::Bundle size may exceed 500KB gzipped target"
            fi
          fi
